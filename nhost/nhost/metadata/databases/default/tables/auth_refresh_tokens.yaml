table:
  name: refresh_tokens
  schema: auth
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    expires_at:
      custom_name: expiresAt
    refresh_token_hash:
      custom_name: refreshTokenHash
    user_id:
      custom_name: userId
  custom_column_names:
    created_at: createdAt
    expires_at: expiresAt
    refresh_token_hash: refreshTokenHash
    user_id: userId
  custom_name: authRefreshTokens
  custom_root_fields:
    delete: deleteAuthRefreshTokens
    delete_by_pk: deleteAuthRefreshToken
    insert: insertAuthRefreshTokens
    insert_one: insertAuthRefreshToken
    select: authRefreshTokens
    select_aggregate: authRefreshTokensAggregate
    select_by_pk: authRefreshToken
    update: updateAuthRefreshTokens
    update_by_pk: updateAuthRefreshToken
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
event_triggers:
  - name: refresh-token-change
    definition:
      enable_manual: false
      insert:
        columns: '*'
      update:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 0
      timeout_sec: 60
    webhook: '{{NHOST_FUNCTIONS_URL}}/events/refresh-token-change'
    headers:
      - name: nhost-webhook-secret
        value_from_env: NHOST_WEBHOOK_SECRET
    cleanup_config:
      batch_size: 10000
      clean_invocation_logs: false
      clear_older_than: 168
      paused: true
      schedule: 0 0 * * *
      timeout: 60
